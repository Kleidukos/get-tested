name: Test actions pipeline

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  test-actions:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Extract the tested GHC versions
        id: create-matrix
        uses: ./
        with:
          cabal-file: get-tested.cabal
          ubuntu-version: 'latest'
          macos-version: 'latest'

      - name: Extract the tested GHC version with older version
        uses: ./
        id: old-naming-scheme
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          version: 0.1.7.0
          cabal-file: get-tested.cabal
          ubuntu-version: 'latest'

      - name: Return a simple list of version
        uses: ./
        id: simple-list
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          version: 0.1.7.0
          cabal-file: get-tested.cabal

      - name: Extract the tested GHC versions with multiple runner versions
        id: multiple-runner-versions
        uses: ./
        with:
          cabal-file: get-tested.cabal
          ubuntu-version: '24.04,latest'
          version: 0.1.10.0-rc1

      - name: Output matrix
        shell: bash
        run: jq '.' <<< '${{ steps.create-matrix.outputs.matrix }}'

      - name: Output matrix for old naming scheme
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run:
          jq '.' <<< '${{ steps.old-naming-scheme.outputs.matrix }}'

      - name: Output matrix for simple list
        shell: bash
        run: jq '.' <<< '${{ steps.simple-list.outputs.matrix }}'

      - name: Output matrix for multiple runner versions
        shell: bash
        run: jq '.' <<< '${{ steps.multiple-runner-versions.outputs.matrix }}'

      - name: Set up without options
        id: setup
        uses: ./setup-get-tested

      - name: Set up with explicit directory
        id: setup-with-directory
        uses: ./setup-get-tested
        with:
          directory: "my-bin-dir"

      - name: Output results
        shell: bash
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          echo "${{ steps.setup.outputs.path }}"
          if [[ -x "${{ steps.setup.outputs.path }}" ]]; then
            echo "Is executable"
          else
            echo "Is NOT executable"
            exit 1
          fi

          echo "${{ steps.setup-with-directory.outputs.path }}"
          if [[ -x "${{ steps.setup-with-directory.outputs.path }}" ]]; then
            echo "Is executable"
          else
            echo "Is NOT executable"
            exit 1
          fi
